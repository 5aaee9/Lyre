{{- if .Values.ingress.enabled -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "lyre.fullname" . }}
  labels:
    {{- include "lyre.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.ingress.className }}
  ingressClassName: {{ . }}
  {{- end }}
  {{- with .Values.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "lyre.apiName" . }}
                port:
                  name: http
          - path: /rpc
            pathType: Prefix
            backend:
              service:
                name: {{ include "lyre.apiName" . }}
                port:
                  name: http
          - path: /health
            pathType: Exact
            backend:
              service:
                name: {{ include "lyre.apiName" . }}
                port:
                  name: http
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: {{ include "lyre.apiName" . }}
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "lyre.webName" . }}
                port:
                  name: http
{{- end }}
