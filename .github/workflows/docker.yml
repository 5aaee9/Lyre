name: Docker

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - name: lyre-api
            target: api
          - name: lyre-web
            target: web
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/${{ matrix.image.name }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.image.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Cleanup Untagged Image
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          packages: ${{ github.event.repository.name }}/${{ matrix.image.name }}
          delete-untagged: true

  helm-chart:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v5
      - uses: azure/setup-helm@v4
      - name: Log in to GHCR for Helm
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io --username "${{ github.actor }}" --password-stdin
      - name: Resolve chart version
        id: chart-version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" == v* ]]; then
            version="${GITHUB_REF_NAME#v}"
          else
            version="0.1.0-${GITHUB_SHA::7}"
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
      - name: Package Helm chart
        run: |
          helm package scripts/kubernetes \
            --destination dist \
            --version "${{ steps.chart-version.outputs.version }}" \
            --app-version "${{ steps.chart-version.outputs.version }}"
      - name: Push Helm chart to GHCR
        run: helm push dist/chart-*.tgz oci://ghcr.io/${{ github.repository }}
      - name: Cleanup Untagged Chart
        uses: dataaxiom/ghcr-cleanup-action@v1
        with:
          packages: ${{ github.event.repository.name }}/chart
          delete-untagged: true
