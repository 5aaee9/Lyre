name: Vercel

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - "crates/lyre-noise-cancelling/**"
      - "crates/lyre-noise-wasm/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/vercel.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Enable pnpm
        run: |
          corepack enable pnpm
          corepack install -g pnpm@10.25.0
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Validate Vercel configuration
        run: |
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
      - name: Install dependencies
        run: pnpm --dir frontend install --frozen-lockfile
      - name: Build noise wasm
        run: pnpm --dir frontend run build:noise-wasm
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel environment
        run: vercel --cwd frontend pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build frontend
        run: LYRE_USE_EXISTING_NOISE_WASM=1 vercel --cwd frontend build --prod --token="$VERCEL_TOKEN"
      - name: Deploy frontend
        run: vercel --cwd frontend deploy --prebuilt --prod --token="$VERCEL_TOKEN"
