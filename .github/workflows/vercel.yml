name: Vercel

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/vercel.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Validate Vercel configuration
        run: |
          test -n "$VERCEL_TOKEN"
          test -n "$VERCEL_ORG_ID"
          test -n "$VERCEL_PROJECT_ID"
      - name: Install dependencies
        run: npm ci --prefix frontend
      - name: Install Vercel CLI
        run: npm install --global vercel@latest
      - name: Pull Vercel environment
        run: vercel --cwd frontend pull --yes --environment=production --token="$VERCEL_TOKEN"
      - name: Build frontend
        run: vercel --cwd frontend build --prod --token="$VERCEL_TOKEN"
      - name: Deploy frontend
        run: vercel --cwd frontend deploy --prebuilt --prod --token="$VERCEL_TOKEN"
