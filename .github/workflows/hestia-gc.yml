name: Hestia Cache GC

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:
    inputs:
      dry-run:
        description: Plan only; do not repack, touch, or delete anything.
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: hestia-gc
  cancel-in-progress: false

jobs:
  gc:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: NixOS/nix-installer-action@main
      - uses: Mic92/hestia/action@main
      - name: Run hestia garbage collection
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          "$HESTIA_BIN" gc ${{ inputs.dry-run && '--dry-run' || '' }}
