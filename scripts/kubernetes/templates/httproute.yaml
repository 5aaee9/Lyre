{{- if .Values.gateway.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "lyre.fullname" . }}
  labels:
    {{- include "lyre.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml .Values.gateway.parentRefs | nindent 4 }}
  {{- with .Values.gateway.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api
      backendRefs:
        - name: {{ include "lyre.apiName" . }}
          port: {{ .Values.api.service.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /rpc
      backendRefs:
        - name: {{ include "lyre.apiName" . }}
          port: {{ .Values.api.service.port }}
    - matches:
        - path:
            type: Exact
            value: /health
      backendRefs:
        - name: {{ include "lyre.apiName" . }}
          port: {{ .Values.api.service.port }}
    - matches:
        - path:
            type: Exact
            value: /metrics
      backendRefs:
        - name: {{ include "lyre.apiName" . }}
          port: {{ .Values.api.service.port }}
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "lyre.webName" . }}
          port: {{ .Values.web.service.port }}
{{- end }}
